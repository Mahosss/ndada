<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nada</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Tajawal:wght@400;500;700;800&family=Alexandria:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%; height: 100%; overflow-x: hidden;
            font-family: 'Tajawal', sans-serif; background-color: #e2d4e7;
        }

       
        .main-container {
            min-height: 100vh; width: 100%; display: flex;
            justify-content: center; align-items: center;
            background: radial-gradient(circle at 20% 20%, #ebdced 0%, transparent 40%),
                        radial-gradient(circle at 80% 80%, #f7e9cf 0%, transparent 50%),
                        linear-gradient(135deg, #d3c2dc 0%, #e8daf0 40%, #ebdcd0 70%, #f3e4c8 100%);
            position: relative; padding: 20px; overflow: hidden;
        }

        .bg-decorations {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            pointer-events: none; z-index: 0;
        }

        .decor-item {
            position: absolute; opacity: 0.8;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

       
        @keyframes float-flower {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(15deg); }
            100% { transform: translateY(5px) rotate(-5deg); }
        }

       
        @keyframes flutter-butterfly {
            0% { transform: translateY(0) translateX(0) scale(1) rotate(0deg); }
            30% { transform: translateY(-15px) translateX(15px) scale(1.1) rotate(10deg); }
            70% { transform: translateY(10px) translateX(-10px) scale(0.9) rotate(-15deg); }
            100% { transform: translateY(-5px) translateX(5px) scale(1) rotate(5deg); }
        }

        .flower { animation: float-flower 5s ease-in-out infinite alternate; font-size: 1.6rem; }
        .butterfly { animation: flutter-butterfly 6s ease-in-out infinite alternate; font-size: 1.8rem; }
        .heart { animation: float-flower 4s ease-in-out infinite alternate; font-size: 1.2rem; opacity: 0.6; }

       
        .fl-top-left { top: 12%; left: 15%; animation-delay: 0s; }
        .fl-top-right { top: 25%; right: 10%; animation-delay: 1s; font-size: 2rem;}
        .fl-mid-left { top: 50%; left: 8%; animation-delay: 2s; }
        .fl-bot-left { bottom: 15%; left: 18%; animation-delay: 1.5s; font-size: 1.8rem;}
        .fl-bot-right { bottom: 18%; right: 12%; animation-delay: 0.5s; }
        
        .heart-top { top: 20%; left: 30%; }
        .heart-mid-left { top: 70%; left: 25%; }
        .heart-bot-right { bottom: 30%; right: 25%; }
        
        .bf-left { top: 55%; left: 15%; transform: scaleX(-1); animation-delay: 0.3s; }
        .bf-right { top: 45%; right: 18%; animation-delay: 1.2s; font-size: 2.2rem; }

    
        .glass-card-wrapper { position: relative; z-index: 10; width: 100%; display: flex; justify-content: center; }
        
        .glass-card-backdrop {
            position: absolute; top: -8px; left: -8px; right: -8px; bottom: -8px;
            background: rgba(255, 255, 255, 0.15); border-radius: 32px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3); z-index: -1;
        }

        .glass-card {
            width: 100%; max-width: 550px;
            background: linear-gradient(135deg, rgba(253, 251, 247, 0.55) 0%, rgba(245, 238, 227, 0.45) 100%);
            border-radius: 26px; border: 1px solid rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 20px 50px rgba(140, 120, 150, 0.15);
            padding: 30px 35px; display: flex; flex-direction: column; align-items: center;
        }

        .brand-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
        .brand-logo-area { display: flex; align-items: center; gap: 10px; }
        .brand-icon { font-size: 1.2rem; color: #dca354; }
        .brand-title-ar {
            font-family: 'Alexandria', sans-serif; font-weight: 700; font-size: 1.9rem;
            background: linear-gradient(180deg, #be995d 0%, #876229 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .brand-title-en { font-family: 'Cairo', sans-serif; font-size: 1.2rem; color: #8a6b3e; margin-top: -5px; }

        .avatar-container { margin-bottom: 20px; }
        .gold-glowing-ring {
            width: 140px; height: 140px; border-radius: 50%; padding: 4px;
            background: linear-gradient(135deg, #f0dfb3 0%, #d4af37 30%, #aa7c11 50%, #f3e5ab 85%, #a67c1e 100%);
            box-shadow: 0 8px 25px rgba(170, 124, 17, 0.35);
            display: flex; justify-content: center; align-items: center;
        }
        .inner-ring { width: 100%; height: 100%; border-radius: 50%; padding: 3px; background: #fff; }
        .profile-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .user-meta { text-align: center; margin-bottom: 25px; }
        .meta-title-ar { font-weight: 700; font-size: 1.4rem; color: #2b2621; }
        .meta-title-en { font-family: 'Cairo', sans-serif; font-weight: 600; font-size: 1.1rem; color: #40372f; margin-bottom: 8px; }
        .meta-bio { font-size: 0.9rem; color: #5c5249; line-height: 1.5; }

       
        .audio-player-box {
            width: 100%; background: rgba(255, 255, 255, 0.6); border-radius: 18px;
            padding: 16px 20px; border: 1px solid rgba(255, 255, 255, 0.8);
            margin-bottom: 24px; box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }

        .track-header-info { text-align: center; font-size: 0.8rem; color: #4a423a; font-weight: 600; margin-bottom: 12px; }
        
        .player-action-row { display: flex; justify-content: center; align-items: center; gap: 25px; margin-bottom: 15px; }
        .btn-player { background: none; border: none; color: #8c7355; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        .btn-player:hover { color: #bfa073; transform: scale(1.1); }
        .btn-main-play {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #e3cc9c 0%, #bfa073 100%); color: #fff;
            display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(191, 160, 115, 0.4);
        }

        .timeline-wrapper { width: 100%; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .time-text { font-size: 0.7rem; color: #8c7355; font-family: 'Cairo'; }
        .timeline-bar-bg { width: 100%; height: 5px; background: rgba(140, 115, 85, 0.2); border-radius: 10px; cursor: pointer; position: relative; }
        .timeline-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #c2a67c, #8c7355); border-radius: 10px; pointer-events: none; }
        .timeline-slider-thumb {
            width: 12px; height: 12px; border-radius: 50%; background: #8c7355;
            position: absolute; right: calc(100% - 6px); top: 50%; transform: translateY(-50%);
        }

      
        .playlist-wrapper { width: 100%; }
        .playlist-tracks-list { list-style: none; width: 100%; display: flex; flex-direction: column; gap: 5px; }
        .track-list-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 15px; border-radius: 12px; cursor: pointer; transition: 0.3s;
            background: rgba(255,255,255,0.2);
        }
        .track-list-item:hover { background: rgba(255, 255, 255, 0.4); }
        .track-list-item.active-playing { background: rgba(255, 255, 255, 0.6); border-right: 3px solid #dca354; }
        .track-leading { display: flex; align-items: center; gap: 10px; }
        .track-index-num { font-weight: 700; color: #8c7355; font-size: 0.9rem; }
        .track-core-title { font-weight: 600; color: #38312a; font-size: 0.95rem; }
        .track-duration-stamp { font-size: 0.8rem; color: #7d7165; margin-left: 10px; }
        .track-status-icon { color: #cccbc6; font-size: 0.85rem; }
        .track-list-item.active-playing .track-status-icon { color: #dca354; animation: pulse-icon 1s infinite alternate; }

        @keyframes pulse-icon { 0% { opacity: 0.4; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1.1); } }

   
        @media (max-width: 600px) {
            .glass-card { padding: 25px 20px; border-radius: 20px; }
            .glass-card-backdrop { border-radius: 24px; top: -5px; left: -5px; right: -5px; bottom: -5px; }
            .brand-title-ar { font-size: 1.6rem; }
            .gold-glowing-ring { width: 110px; height: 110px; } 
            .meta-title-ar { font-size: 1.2rem; }
            .meta-bio { font-size: 0.85rem; }
            .audio-player-box { padding: 12px 15px; }
            .track-list-item { padding: 8px 10px; }
            .track-core-title { font-size: 0.85rem; }
            .flower { font-size: 1.2rem; }
            .butterfly { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <audio id="audioPlayer"></audio>

        <div class="bg-decorations">
            <span class="decor-item flower fl-top-left">🌸</span>
            <span class="decor-item flower fl-top-right">🌸</span>
            <span class="decor-item heart heart-top">🤍</span>
            <span class="decor-item flower fl-bot-left">🌸</span>
            <span class="decor-item flower fl-bot-right">🌸</span>
            <span class="decor-item heart heart-mid-left">✨</span>
            <span class="decor-item heart heart-bot-right">✨</span>
            <span class="decor-item butterfly bf-left">🦋</span>
            <span class="decor-item butterfly bf-right">🦋</span>
        </div>

        <div class="glass-card-wrapper">
            <div class="glass-card-backdrop"></div>
            <div class="glass-card">
                
                <div class="brand-header">
                    <div class="brand-logo-area">
                        <span class="brand-icon"><i class="fas fa-star"></i></span>
                        <h1 class="brand-title-ar">نَدَى</h1>
                        <span class="brand-icon">🌸</span>
                    </div>
                    <h2 class="brand-title-en">N̥̊ḁ̊d̥̊ḁ̊ḁ̊</h2>
                </div>

                <div class="avatar-container">
                    <div class="gold-glowing-ring">
                        <div class="inner-ring">
                            <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&q=80&w=400" alt="Nada" class="profile-avatar">
                        </div>
                    </div>
                </div>

                <div class="user-meta">
                    <p class="meta-bio">أنا لستُ امرأةً عادية، أنا قصةٌ لا تتكرر، وحضورٌ لا يُمحى من الذاكرة</p>
                </div>

                <div class="audio-player-box">
                    <div class="track-header-info" id="currentTrackTitle">
                        أغنية النجوم | N.Dreams
                    </div>
                    
                    <div class="player-action-row">
                        <button class="btn-player" id="prevBtn"><i class="fas fa-step-backward"></i></button>
                        <button class="btn-player btn-main-play" id="mainPlayBtn"><i class="fas fa-play" id="playIcon"></i></button>
                        <button class="btn-player" id="nextBtn"><i class="fas fa-step-forward"></i></button>
                    </div>

                    <div class="timeline-wrapper">
                        <span class="time-text" id="currentTime">00:00</span>
                        <div class="timeline-bar-bg" id="progressBarBg">
                            <div class="timeline-bar-fill" id="progressBarFill"></div>
                            <span class="timeline-slider-thumb" id="progressThumb"></span>
                        </div>
                        <span class="time-text" id="totalDuration">00:00</span>
                    </div>
                </div>

                <div class="playlist-wrapper">
                    <ul class="playlist-tracks-list" id="playlist">
                        </ul>
                </div>

            </div>
        </div>
    </div>

    <script>
        
        const tracks = [
            { title: "كاظم كونى امرأة", artist: "N.Dreams", duration: "06:12", src: "https://alfrsantv.com/radio/song/Koni_Imraatan.mp3" },
            { title: "كاظم شؤن صغيرة", artist: "N.Dreams", duration: "07:05", src: "https://alfrsantv.com/radio/song/Shounoun_Saghira.mp3" },
            { title: "ماجد المهندس فرصة مجنونة", artist: "N.Dreams", duration: "05:44", src: "https://alfrsantv.com/radio/song/Forsa.Magnona.mp3" },
        ];

        let currentTrackIndex = 0;
        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('mainPlayBtn');
        const playIcon = document.getElementById('playIcon');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const titleDisplay = document.getElementById('currentTrackTitle');
        const playlistContainer = document.getElementById('playlist');
        
        const progressBarBg = document.getElementById('progressBarBg');
        const progressBarFill = document.getElementById('progressBarFill');
        const progressThumb = document.getElementById('progressThumb');
        const currentTimeEl = document.getElementById('currentTime');
        const totalDurationEl = document.getElementById('totalDuration');

        // بناء قائمة الأغاني في HTML ديناميكياً
        function buildPlaylist() {
            playlistContainer.innerHTML = '';
            tracks.forEach((track, index) => {
                const li = document.createElement('li');
                li.className = `track-list-item ${index === currentTrackIndex ? 'active-playing' : ''}`;
                li.innerHTML = `
                    <div class="track-leading">
                        <span class="track-index-num">${index + 1}.</span>
                        <span class="track-core-title">${track.title}</span>
                    </div>
                    <div class="track-trailing">
                        <span class="track-duration-stamp">(${track.duration})</span>
                        <span class="track-status-icon"><i class="fas fa-${index === currentTrackIndex ? 'volume-up' : 'music'}"></i></span>
                    </div>
                `;
                li.addEventListener('click', () => loadAndPlayTrack(index));
                playlistContainer.appendChild(li);
            });
        }

        // تحميل وتشغيل أغنية معينة
        function loadAndPlayTrack(index) {
            currentTrackIndex = index;
            const track = tracks[index];
            audio.src = track.src;
            titleDisplay.innerText = `${track.title} | ${track.artist}`;
            
            buildPlaylist(); // لتحديث العنصر النشط في القائمة
            playAudio();
        }

        function playAudio() {
            audio.play();
            playIcon.className = 'fas fa-pause';
        }

        function pauseAudio() {
            audio.pause();
            playIcon.className = 'fas fa-play';
        }

        // تفاعل زر التشغيل والإيقاف
        playBtn.addEventListener('click', () => {
            if (audio.src === "") { loadAndPlayTrack(0); } 
            else if (audio.paused) { playAudio(); } 
            else { pauseAudio(); }
        });

        // زر التالي
        nextBtn.addEventListener('click', () => {
            let nextIndex = currentTrackIndex + 1;
            if (nextIndex >= tracks.length) nextIndex = 0;
            loadAndPlayTrack(nextIndex);
        });

        // زر السابق
        prevBtn.addEventListener('click', () => {
            let prevIndex = currentTrackIndex - 1;
            if (prevIndex < 0) prevIndex = tracks.length - 1;
            loadAndPlayTrack(prevIndex);
        });

        // تحديث شريط التقدم والوقت
        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const progressPercent = (audio.currentTime / audio.duration) * 100;
                progressBarFill.style.width = `${progressPercent}%`;
                // تحريك النقطة مع الشريط المعكوس لأن الاتجاه RTL
                progressThumb.style.right = `calc(${progressPercent}% - 6px)`;

                // تنسيق الوقت (دقائق:ثواني)
                let currentMins = Math.floor(audio.currentTime / 60);
                let currentSecs = Math.floor(audio.currentTime % 60);
                if (currentSecs < 10) currentSecs = `0${currentSecs}`;
                currentTimeEl.innerText = `0${currentMins}:${currentSecs}`;
                
                let totalMins = Math.floor(audio.duration / 60);
                let totalSecs = Math.floor(audio.duration % 60);
                if (totalSecs < 10) totalSecs = `0${totalSecs}`;
                if(!isNaN(totalMins)) totalDurationEl.innerText = `0${totalMins}:${totalSecs}`;
            }
        });

        // الضغط على شريط التقدم لتقديم/تأخير الأغنية
        progressBarBg.addEventListener('click', (e) => {
            const width = progressBarBg.clientWidth;
            const clickX = e.offsetX; // المسافة من اليسار
            // لأن الصفحة RTL والمحاذاة معكوسة، نحتاج لحساب النسبة بشكل صحيح
            const duration = audio.duration;
            audio.currentTime = ((width - clickX) / width) * duration;
        });

        // عند انتهاء الأغنية، شغل التي تليها تلقائياً
        audio.addEventListener('ended', () => {
            nextBtn.click();
        });

        // التحميل الأولي للمشهد
        window.addEventListener('DOMContentLoaded', () => {
            buildPlaylist();
            // تجهيز بيانات أول أغنية بدون تشغيل تلقائي
            const track = tracks[0];
            audio.src = track.src;
            titleDisplay.innerText = `${track.title} | ${track.artist}`;
        });
    </script>
</body>
</html>
