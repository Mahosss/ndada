<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nada Music Profile</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background">

<div class="blur blur1"></div>
<div class="blur blur2"></div>
<div class="blur blur3"></div>

</div>

<div class="card">

<div class="top">

<h1>Nada</h1>

</div>

<div class="avatar">

<div class="avatar-border">

<img src="images/profile.jpg">

</div>

</div>

<div class="info">

<h2>ندى</h2>

<h3>Nada</h3>

<p>

A blend of music, art and starry dreams.

</p>

</div>

<div class="music-player">

<div class="cover">

<img src="images/profile.jpg">

</div>

<div class="music-info">

<h4 id="songName">

Starry Night

</h4>

<span id="artist">

Nada

</span>

</div>

<div class="controls">

<button id="prev">

<i class="fa-solid fa-backward-step"></i>

</button>

<button id="play">

<i class="fa-solid fa-play"></i>

</button>

<button id="next">

<i class="fa-solid fa-forward-step"></i>

</button>

</div>

<div class="progress">

<input
type="range"
id="progress"
value="0"
min="0"
max="100">

</div>

</div>

<div class="playlist">

<div class="title">

Playlist

</div>

<ul>

<li class="active">

<span>01</span>

<div>

<h4>Starry Night</h4>

<p>Nada</p>

</div>

<i class="fa-solid fa-music"></i>

</li>

<li>

<span>02</span>

<div>

<h4>Dream</h4>

<p>Nada</p>

</div>

<i class="fa-solid fa-music"></i>

</li>

<li>

<span>03</span>

<div>

<h4>Golden Sky</h4>

<p>Nada</p>

</div>

<i class="fa-solid fa-music"></i>

</li>

<li>

<span>04</span>

<div>

<h4>Moon Light</h4>

<p>Nada</p>

</div>

<i class="fa-solid fa-music"></i>

</li>

<li>

<span>05</span>

<div>

<h4>Butterfly</h4>

<p>Nada</p>

</div>

<i class="fa-solid fa-music"></i>

</li>

</ul>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
