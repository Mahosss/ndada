<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل موسيقى ندى - Nada Music Player</title>
    <!-- استيراد خطوط جوجل الفاخرة لدعم العربية والإنجليزية بشكل متناسق ومطابق للتصميم -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Tajawal:wght@400;500;700;800&family=Alexandria:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- مكتبة FontAwesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* التنسيقات الأساسية وإعادة التعيين */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            font-family: 'Tajawal', sans-serif;
            background-color: #e2d4e7;
        }

        /* الحاوية الرئيسية للتصميم والتدرج اللوني الفخم للخلفية */
        .main-container {
            min-height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            /* تدرج لوني يدمج البنفسجي الناعم، الوردي، والذهبي الدافئ مثل الصورة تماماً */
            background: radial-gradient(circle at 20% 20%, #ebdced 0%, transparent 40%),
                        radial-gradient(circle at 80% 80%, #f7e9cf 0%, transparent 50%),
                        linear-gradient(135deg, #d3c2dc 0%, #e8daf0 40%, #ebdcd0 70%, #f3e4c8 100%);
            position: relative;
            padding: 40px 20px;
            overflow: hidden;
        }

        /* زخارف الخلفية العائمة والمضيئة */
        .bg-decorations {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }

        .decor-item {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.65;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.05));
            animation: float-softly 6s ease-in-out infinite alternate;
        }

        @keyframes float-softly {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-10px) rotate(5deg); }
        }

        /* تحديد مواقع دقيقة لعناصر الزينة بناءً على الصورة */
        .fl-top-left { top: 15%; left: 18%; font-size: 1.4rem; animation-delay: 0s; }
        .fl-top-right { top: 28%; right: 12%; font-size: 1.6rem; animation-delay: 1s; }
        .fl-mid-left { top: 48%; left: 10%; font-size: 1.3rem; animation-delay: 2s; }
        .fl-bot-left { bottom: 12%; left: 22%; font-size: 1.5rem; animation-delay: 1.5s; }
        .fl-bot-right { bottom: 20%; right: 15%; font-size: 1.2rem; animation-delay: 0.5s; }
        
        .heart-top { top: 25%; left: 28%; font-size: 1.1rem; opacity: 0.5; }
        .heart-mid-left { top: 65%; left: 22%; font-size: 1.2rem; opacity: 0.6; }
        .heart-bot-right { bottom: 28%; right: 28%; font-size: 1.1rem; opacity: 0.5; }
        
        .bf-left { top: 60%; left: 10%; font-size: 1.8rem; opacity: 0.35; transform: scaleX(-1); }
        .bf-right { top: 52%; right: 20%; font-size: 1.6rem; opacity: 0.4; }
        
        .sparkle { position: absolute; color: #fff; opacity: 0.6; font-size: 0.8rem; }
        .sp1 { top: 8%; right: 40%; }
        .sp2 { bottom: 15%; left: 45%; font-size: 1.2rem; }

        /* البطاقة الزجاجية النظيفة (Glassmorphism) */
        .glass-card-wrapper {
            position: relative;
            z-index: 10;
        }

        /* الإطار الخلفي الشفاف الإضافي الموضح بالصورة ليعطي عمق أعمق */
        .glass-card-backdrop {
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 32px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: -1;
        }

        .glass-card {
            width: 100%;
            max-width: 390px;
            background: linear-gradient(135deg, rgba(253, 251, 247, 0.45) 0%, rgba(245, 238, 227, 0.35) 100%);
            border-radius: 26px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 20px 50px rgba(140, 120, 150, 0.15), 
                        inset 0 0 20px rgba(255, 255, 255, 0.3);
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* قسم الاسم العلوي والشعار الفني الزخرفي */
        .brand-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 22px;
            position: relative;
        }

        .brand-logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .brand-icon {
            font-size: 1.2rem;
            color: #dca354;
            filter: drop-shadow(0 2px 4px rgba(220,163,84,0.3));
        }

        .brand-title-ar {
            font-family: 'Alexandria', sans-serif;
            font-weight: 700;
            font-size: 1.9rem;
            color: #8c6a3c;
            /* تأثير التدرج الذهبي المطفي الراقي للكتابة */
            background: linear-gradient(180deg, #be995d 0%, #876229 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            text-shadow: 0px 1px 1px rgba(255,255,255,0.5);
        }

        .brand-title-en {
            font-family: 'Cairo', sans-serif;
            font-weight: 400;
            font-size: 1.25rem;
            color: #8a6b3e;
            margin-top: -6px;
            letter-spacing: 0.5px;
        }

        /* الإطار الدائري الذهبي الفاخر والمضيء المحيط بالصورة الشخصية */
        .avatar-container {
            margin-bottom: 22px;
            position: relative;
        }

        .gold-glowing-ring {
            width: 142px;
            height: 142px;
            border-radius: 50%;
            padding: 4px;
            /* تأثير تدرج معدني ذهبي ثلاثي الأبعاد */
            background: linear-gradient(135deg, #f0dfb3 0%, #d4af37 30%, #aa7c11 50%, #f3e5ab 85%, #a67c1e 100%);
            box-shadow: 0 8px 25px rgba(170, 124, 17, 0.35), 
                        inset 0 0 10px rgba(255, 255, 255, 0.6),
                        0 0 15px rgba(212, 175, 55, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .inner-ring {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            padding: 3px;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.15);
        }

        .profile-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        /* نصوص ومعلومات العرض التوضيحية */
        .user-meta {
            text-align: center;
            margin-bottom: 26px;
            width: 100%;
        }

        .meta-title-ar {
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: #2b2621;
            margin-bottom: 2px;
        }

        .meta-title-en {
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            font-size: 1.15rem;
            color: #40372f;
            margin-bottom: 8px;
        }

        .meta-bio {
            font-family: 'Cairo', sans-serif;
            font-weight: 400;
            font-size: 0.88rem;
            color: #5c5249;
            line-height: 1.4;
            max-width: 85%;
            margin: 0 auto;
        }

        /* واجهة وتصميم مشغل الصوت الصغير المتناسق */
        .audio-player-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.45);
            border-radius: 18px;
            padding: 16px 20px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 25px rgba(160, 140, 120, 0.08);
            margin-bottom: 24px;
        }

        .track-header-info {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.76rem;
            color: #4a423a;
            font-weight: 600;
            margin-bottom: 14px;
            text-align: center;
        }

        .track-header-info .bar-divider {
            color: #b5a494;
            font-weight: 300;
            margin: 0 4px;
        }

        /* أزرار التحكم بالمشغل */
        .player-action-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 22px;
            margin-bottom: 14px;
        }

        .btn-player {
            background: none;
            border: none;
            color: #8c7355;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-player:hover {
            color: #bfa073;
            transform: scale(1.1);
        }

        /* زر التشغيل الدائري الذهبي الكبير المطابق للصورة */
        .btn-player.btn-main-play {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e3cc9c 0%, #bfa073 100%);
            color: #fff;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(191, 160, 115, 0.4);
            padding-right: 2px; /* لتوسيط أيقونة المثلث هندسياً */
        }
        
        .btn-player.btn-main-play.playing {
            padding-right: 0;
        }

        .btn-player.btn-main-play:hover {
            background: linear-gradient(135deg, #ebd6aa 0%, #ccae82 100%);
            box-shadow: 0 5px 12px rgba(191, 160, 115, 0.5);
            transform: scale(1.05);
        }

        /* شريط تقدم الأغنية والتايم لاين */
        .timeline-wrapper {
            display: flex;
            align-items: center;
            width: 100%;
            margin-bottom: 12px;
        }

        .timeline-bar-bg {
            width: 100%;
            height: 4px;
            background: rgba(140, 115, 85, 0.15);
            border-radius: 10px;
            position: relative;
            cursor: pointer;
        }

        .timeline-bar-fill {
            width: 35%; /* نسبة افتراضية تقدم مسار الأغنية */
            height: 100%;
            background: linear-gradient(90deg, #c2a67c, #8c7355);
            border-radius: 10px;
            position: relative;
        }

        /* مؤشر النقطة المتحرك على شريط التقدم */
        .timeline-slider-thumb {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #8c7355;
            position: absolute;
            right: -5px;
            top: 50%;
            transform: translateY(-50%);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }

        /* الجزء السفلي للمشغل (أيقونة الصوت الجانبية) */
        .player-footer-row {
            width: 100%;
            display: flex;
            justify-content: flex-start; /* الأيقونة بجهة اليسار بناءً على اتجاه الصفحة RTL */
            color: #8c7355;
            font-size: 0.9rem;
        }
        
        .player-footer-row i {
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .player-footer-row i:hover {
            color: #bfa073;
        }

        /* قائمة مسارات الأغاني السفليّة */
        .playlist-wrapper {
            width: 100%;
        }

        .playlist-tracks-list {
            list-style: none;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .track-list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 9px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .track-list-item:hover {
            background: rgba(255, 255, 255, 0.22);
        }

        .track-list-item.active-playing {
            background: rgba(255, 255, 255, 0.35);
        }

        .track-leading {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .track-index-num {
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            color: #8c7355;
            font-size: 0.9rem;
            width: 18px;
        }

        .track-core-title {
            font-family: 'Tajawal', sans-serif;
            font-weight: 500;
            font-size: 0.92rem;
            color: #38312a;
        }

        .track-trailing {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .track-duration-stamp {
            font-family: 'Cairo', sans-serif;
            font-size: 0.78rem;
            color: #7d7165;
        }

        .track-status-icon {
            font-size: 0.8rem;
            color: #cccbc6;
            width: 16px;
            text-align: center;
        }

        .track-list-item.active-playing .track-status-icon {
            color: #dca354;
            animation: pulse-icon 1.5s infinite alternate;
        }

        @keyframes pulse-icon {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <!-- عناصر الزينة الديكورية في الخلفية (ورود صفراء وبيضاء، قلوب وفراشات رقيقة) -->
        <div class="bg-decorations">
            <span class="decor-item fl-top-left">🌸</span>
            <span class="decor-item fl-top-right">🌸</span>
            <span class="decor-item fl-mid-left">🤍</span>
            <span class="decor-item fl-bot-left">🌸</span>
            <span class="decor-item fl-bot-right">🌸</span>
            
            <span class="decor-item heart-top">✨</span>
            <span class="decor-item heart-mid-left">✨</span>
            <span class="decor-item heart-bot-right">✨</span>
            
            <span class="decor-item bf-left">🦋</span>
            <span class="decor-item bf-right">🦋</span>
            
            <span class="sparkle sp1">✦</span>
            <span class="sparkle sp2">✦</span>
        </div>

        <!-- الهيكل الرئيسي للبطاقة مع التأثير الزجاجي المزدوج العميق -->
        <div class="glass-card-wrapper">
            <div class="glass-card-backdrop"></div>
            <div class="glass-card">
                
                <!-- الشعار العلوي بالاسم العربي والإنجليزي والتدرج اللوني -->
                <div class="brand-header">
                    <div class="brand-logo-area">
                        <span class="brand-icon"><i class="fas fa-star"></i></span>
                        <h1 class="brand-title-ar">نَدَى</h1>
                        <span class="brand-icon">🌸</span>
                    </div>
                    <h2 class="brand-title-en">Nada</h2>
                </div>

                <!-- الإطار الدائري المشرق وبداخله الصورة الشخصية للبنت -->
                <div class="avatar-container">
                    <div class="gold-glowing-ring">
                        <div class="inner-ring">
                            <!-- تم استخدام صورة فتاة سمراء ذات شعر كيرلي مطابقة تماماً للموجودة في التصميم الأصلي -->
                            <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&q=80&w=400" alt="Nada" class="profile-avatar">
                        </div>
                    </div>
                </div>

                <!-- معلومات وحسابات الاسم والوصف النصي المكتوب بالصورة -->
                <div class="user-meta">
                    <h3 class="meta-title-ar">نَدَى</h3>
                    <h4 class="meta-title-en">Nada</h4>
                    <p class="meta-bio">A blend of music, art, and starry dreams.</p>
                </div>

                <!-- مشغل المسارات الصوتية الصغير الأنيق بكامل أزراره -->
                <div class="audio-player-box">
                    <div class="track-header-info">
                        <span>Title: Starry Lullaby</span>
                        <span class="bar-divider">|</span>
                        <span>Artist: N.Dreams</span>
                    </div>
                    
                    <div class="player-action-row">
                        <button class="btn-player" title="المقطع السابق"><i class="fas fa-step-backward"></i></button>
                        <button class="btn-player btn-main-play" id="mainPlayBtn" title="تشغيل / إيقاف"><i class="fas fa-play" id="playIcon"></i></button>
                        <button class="btn-player" title="المقطع التالي"><i class="fas fa-step-forward"></i></button>
                    </div>

                    <div class="timeline-wrapper">
                        <div class="timeline-bar-bg">
                            <div class="timeline-bar-fill">
                                <span class="timeline-slider-thumb"></span>
                            </div>
                        </div>
                    </div>

                    <div class="player-footer-row">
                        <i class="fas fa-volume-up" title="التحكم بالصوت"></i>
                    </div>
                </div>

                <!-- قائمة الأناشيد والمقاطع الموسيقية الـ 5 المذكورة بالصورة بالترتيب والوقت -->
                <div class="playlist-wrapper">
                    <ul class="playlist-tracks-list">
                        
                        <li class="track-list-item active-playing">
                            <div class="track-leading">
                                <span class="track-index-num">1.</span>
                                <span class="track-core-title">أغنية النجوم</span>
                            </div>
                            <div class="track-trailing">
                                <span class="track-duration-stamp">(03:45)</span>
                                <span class="track-status-icon"><i class="fas fa-volume-up"></i></span>
                            </div>
                        </li>

                        <li class="track-list-item">
                            <div class="track-leading">
                                <span class="track-index-num">2.</span>
                                <span class="track-core-title">أحلام ياسمين</span>
                            </div>
                            <div class="track-trailing">
                                <span class="track-duration-stamp">(04:12)</span>
                                <span class="track-status-icon"><i class="fas fa-volume-up"></i></span>
                            </div>
                        </li>

                        <li class="track-list-item">
                            <div class="track-leading">
                                <span class="track-index-num">3.</span>
                                <span class="track-core-title">لحن السهر</span>
                            </div>
                            <div class="track-trailing">
                                <span class="track-duration-stamp">(03:20)</span>
                                <span class="track-status-icon"><i class="fas fa-volume-up"></i></span>
                            </div>
                        </li>

                        <li class="track-list-item">
                            <div class="track-leading">
                                <span class="track-index-num">4.</span>
                                <span class="track-core-title">همس الفجر</span>
                            </div>
                            <div class="track-trailing">
                                <span class="track-duration-stamp">(04:01)</span>
                                <span class="track-status-icon"><i class="fas fa-volume-up"></i></span>
                            </div>
                        </li>

                        <li class="track-list-item">
                            <div class="track-leading">
                                <span class="track-index-num">5.</span>
                                <span class="track-core-title">رقصة المطر</span>
                            </div>
                            <div class="track-trailing">
                                <span class="track-duration-stamp">(03:58)</span>
                                <span class="track-status-icon"><i class="fas fa-volume-up"></i></span>
                            </div>
                        </li>

                    </ul>
                </div>

            </div>
        </div>
    </div>

    <!-- إضافة ميزة برمجية تفاعلية بسيطة لتغيير أيقونة التشغيل والتبديل عند الضغط -->
    <script>
        const mainPlayBtn = document.getElementById('mainPlayBtn');
        const playIcon = document.getElementById('playIcon');
        let isPlaying = false;

        mainPlayBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            if(isPlaying) {
                playIcon.className = 'fas fa-pause';
                mainPlayBtn.classList.add('playing');
            } else {
                playIcon.className = 'fas fa-play';
                mainPlayBtn.classList.remove('playing');
            }
        });

        // جعل عناصر القائمة تفاعلية عند النقر عليها لاختيار الأغنية
        const items = document.querySelectorAll('.track-list-item');
        items.forEach(item => {
            item.addEventListener('click', () => {
                items.forEach(i => i.classList.remove('active-playing'));
                item.classList.add('active-playing');
            });
        });
    </script>
</body>
</html>
