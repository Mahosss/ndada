<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nada Music Card</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background">

    <span class="spark s1"></span>
    <span class="spark s2"></span>
    <span class="spark s3"></span>
    <span class="spark s4"></span>
    <span class="spark s5"></span>

</div>


<div class="card">

    <div class="logo">
        ✿
        <h1>Nada</h1>
    </div>

    <div class="profile">

        <div class="circle">

            <img src="images/profile.jpg">

        </div>

    </div>


    <div class="info">

        <h2>ندى</h2>

        <h3>Nada</h3>

        <p>
            A blend of music, art and starry dreams.
        </p>

    </div>


    <div class="player">

        <audio id="audio"></audio>

        <div class="song-title">

            <span id="musicName">
                Starry Lullaby
            </span>

        </div>


        <div class="controls">

            <button id="prev">
                <i class="fa-solid fa-backward"></i>
            </button>

            <button id="play">
                <i class="fa-solid fa-play"></i>
            </button>

            <button id="next">
                <i class="fa-solid fa-forward"></i>
            </button>

        </div>


        <div class="progress">

            <input
            type="range"
            value="0"
            min="0"
            max="100"
            id="progress">

        </div>

    </div>



    <div class="playlist">

        <ul>

            <li class="active">
                <span>1. أغنية النجوم</span>
                <span>03:45</span>
            </li>

            <li>
                <span>2. أحلام بعيدة</span>
                <span>04:12</span>
            </li>

            <li>
                <span>3. لحن القمر</span>
                <span>03:20</span>
            </li>

            <li>
                <span>4. همس البحر</span>
                <span>04:01</span>
            </li>

            <li>
                <span>5. رقصة المطر</span>
                <span>03:58</span>
            </li>

        </ul>

    </div>

</div>


<script src="script.js"></script>

</body>
</html>
